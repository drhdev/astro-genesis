name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync Astro types
        run: npm run sync

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build
